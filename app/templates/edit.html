{% extends "base.html" %}

{% block title %}{% if recipe %}編輯食譜{% else %}新增食譜{% endif %} - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">{% if recipe %}編輯食譜{% else %}新增食譜{% endif %}</h2>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">取消</a>
        </div>
        
        <div class="content-section">
            <form action="{% if recipe %}{{ url_for('routes.update_recipe', id=recipe.id) }}{% else %}{{ url_for('routes.create_recipe') }}{% endif %}" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="title" name="title" value="{{ recipe.title if recipe else '' }}" required placeholder="例如：台式三杯雞">
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="image" class="form-label fw-bold">上傳圖片</label>
                        <input class="form-control" type="file" id="image" name="image" accept="image/*">
                        {% if recipe and recipe.image_path %}
                        <div class="mt-2 small text-muted">
                            目前圖片：<img src="{{ url_for('static', filename='images/' ~ recipe.image_path) }}" alt="thumbnail" class="img-thumbnail ms-2" style="max-height: 50px;">
                        </div>
                        {% endif %}
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="source_url" class="form-label fw-bold">來源網址</label>
                        <input type="url" class="form-control" id="source_url" name="source_url" value="{{ recipe.source_url if recipe else '' }}" placeholder="https://...">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">分類標籤</label>
                    <div class="card bg-light border-0">
                        <div class="card-body py-2 px-3">
                            <div class="d-flex flex-wrap gap-2 mb-2">
                                {% for tag in tags %}
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="checkbox" name="tags" id="tag_{{ tag.id }}" value="{{ tag.id }}" 
                                        {% if tag.id in recipe_tag_ids %}checked{% endif %}>
                                    <label class="form-check-label" for="tag_{{ tag.id }}">{{ tag.name }}</label>
                                </div>
                                {% endfor %}
                            </div>
                            <input type="text" class="form-control form-control-sm" name="new_tags" placeholder="輸入新標籤（多個請用逗號分隔）">
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="ingredients" class="form-label fw-bold">所需食材</label>
                    <textarea class="form-control" id="ingredients" name="ingredients" rows="5" placeholder="例如：
雞腿肉 1隻
九層塔 1把
麻油 2大匙">{{ recipe.ingredients if recipe else '' }}</textarea>
                </div>
                
                <div class="mb-4">
                    <label for="instructions" class="form-label fw-bold">製作步驟</label>
                    <textarea class="form-control" id="instructions" name="instructions" rows="8" placeholder="例如：
1. 雞腿肉切塊川燙備用。
2. 熱鍋下麻油，煸香薑片。
3. ...">{{ recipe.instructions if recipe else '' }}</textarea>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="submit" class="btn btn-primary px-5">{% if recipe %}儲存變更{% else %}新增食譜{% endif %}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
